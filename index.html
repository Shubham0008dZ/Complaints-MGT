<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERP Complaint System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- LOGIN -->
        <div id="view-login" class="card" style="display:none;">
            <h2>ERP Login</h2>
            <input type="text" id="l-user" placeholder="User ID">
            <input type="password" id="l-pass" placeholder="Password / PIN">
            <button id="btn-login" onclick="doLogin()">Login</button>
            <p onclick="show('view-reg')">New User? Register</p>
        </div>

        <!-- REGISTER -->
        <div id="view-reg" class="card" style="display:none">
            <h2>Register</h2>
            <input type="text" id="r-name" placeholder="Full Name *">
            <input type="text" id="r-coord" placeholder="Coordinator *">
            <input type="text" id="r-desig" placeholder="Designation *">
            <input type="password" id="r-pass" placeholder="Set Password *">
            <input type="email" id="r-email" placeholder="Email *">
            <button id="btn-otp" class="outline-btn" onclick="sendOTP()">Verify Email</button>
            <div id="otp-box" style="display:none">
                <input type="text" id="r-otp" placeholder="Enter 6-digit OTP">
                <button id="btn-verify-otp" class="outline-btn" onclick="verifyOTP()">Confirm OTP</button>
            </div>
            <button id="btn-reg" disabled onclick="doRegister()">Register Account</button>
            <p onclick="show('view-login')">Back to Login</p>
        </div>

        <!-- RESET -->
        <div id="view-reset" class="card" style="display:none">
            <h2>Reset Password</h2>
            <p class="small-text">Enter the new password for your account.</p>
            <input type="password" id="rs-new" placeholder="New Password">
            <button id="btn-reset" onclick="doReset()">Update & Login</button>
        </div>

        <!-- EMPLOYEE DASHBOARD -->
        <div id="view-emp" style="display:none">
            <div class="header">
                <h3 style="margin: 0;">Employee Portal</h3>
                <div style="display: flex; gap: 10px;">
                    <button class="outline-btn" style="width:auto; margin:0; padding:8px 15px; font-size:14px;" onclick="toggleTicketForm(true)">+ Add Ticket</button>
                    <button class="logout-btn" onclick="doLogout()">Logout</button>
                </div>
            </div>
            
            <div id="ticket-form-section" class="card" style="display:none;">
                <h3>Raise Ticket</h3>
                <input type="text" id="t-title" placeholder="Ticket Title (Mandatory) *">
                <textarea id="t-issue" rows="3" placeholder="Describe your issue... *"></textarea>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="btn-submit-ticket" onclick="addTicket()">Submit Ticket</button>
                    <button class="outline-btn" onclick="toggleTicketForm(false)">Cancel</button>
                </div>
            </div>

            <div class="card table-container">
                <table id="t-emp"></table>
            </div>
        </div>

        <!-- ADMIN DASHBOARD -->
        <div id="view-adm" style="display:none">
            <div class="header">
                <h3 style="margin: 0;">Admin Panel</h3>
                <button class="logout-btn" onclick="doLogout()">Logout</button>
            </div>
            <div class="card table-container">
                <table id="t-adm"></table>
            </div>
        </div>
    </div>

    <!-- ORIGINAL DESKTOP CHAT MODAL -->
    <div id="chat-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="chat-title">Ticket Details</h3>
                <span class="close-btn" onclick="closeChat()">&times;</span>
            </div>
            <div id="chat-box" class="chat-container">
                <!-- Chats will load here -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-msg" placeholder="Type a reply...">
                <button id="btn-send-reply" onclick="sendReply()">Send</button>
            </div>
        </div>
    </div>

    <!-- ORIGINAL DESKTOP READ MORE MODAL -->
    <div id="issue-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="issue-modal-title">Full Details</h3>
                <span class="close-btn" onclick="closeIssueModal()">&times;</span>
            </div>
            <div id="full-issue-text" class="chat-container" style="white-space: pre-wrap; font-size: 15px; word-wrap: break-word; line-height: 1.6;">
                <!-- Poora text yahan aayega -->
            </div>
        </div>
    </div>

    <!-- NEW MOBILE CAPSULE UI (Completely Isolated) -->
    <div id="capsule-modal" class="capsule-overlay" style="display:none; opacity: 0;">
        <div class="capsule-wrapper" id="capsule-wrapper">
            
            <div class="capsule-bar" id="capsule-bar">
                <span class="wheel-text left-text">Desc</span>
                <!-- WHEEL LOOK UPDATED WITH 3 GRIPS -->
                <div class="wheel" id="wheel">
                    <div class="wheel-grip"></div>
                    <div class="wheel-grip"></div>
                    <div class="wheel-grip"></div>
                </div>
                <span class="wheel-text right-text">Chat</span>
            </div>
            
            <div class="capsule-content desc-box" id="capsule-content-desc">
                <div class="capsule-header">Ticket Description <span class="cap-close" onclick="closeCapsuleModal()">×</span></div>
                <div id="capsule-desc-text" class="capsule-body" style="white-space: pre-wrap; font-size: 14px;"></div>
            </div>

            <div class="capsule-content chat-box" id="capsule-content-chat">
                <div class="capsule-header">Communication <span class="cap-close" onclick="closeCapsuleModal()">×</span></div>
                <div id="capsule-chat-box" class="capsule-body chat-bg" style="display:flex; flex-direction:column; gap:10px;"></div>
                <div class="capsule-chat-input">
                    <input type="text" id="capsule-chat-msg" placeholder="Type reply...">
                    <button id="capsule-btn-send-reply" onclick="sendCapsuleReply()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
